FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Monospace" font-size="13" lengthAdjust="spacing" textLength="302.8743" x="790" y="329.4649">Do&#160;not&#160;expose&#160;SMB&#160;directly&#160;to&#160;the&#160;public&#160;internet.</text><text fill="#000000" font-family="Monospace" font-size="13" lengthAdjust="spacing" textLength="305.4872" x="790" y="347.1709">Remote&#160;access&#160;should&#160;traverse&#160;a&#160;private&#160;VPN&#160;first.</text></g><g class="entity" data-qualified-name="GMN36" data-source-line="56" id="ent0037"><path d="M719,508.5679 L719,527.0679 L663.2803,531.0679 L719,535.0679 L719,553.9799 A0,0 0 0 0 719,553.9799 L1062.8423,553.9799 A0,0 0 0 0 1062.8423,553.9799 L1062.8423,518.5679 L1052.8423,508.5679 L719,508.5679 A0,0 0 0 0 719,508.5679" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1052.8423,508.5679 L1052.8423,518.5679 L1062.8423,518.5679 L1052.8423,508.5679" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Monospace" font-size="13" lengthAdjust="spacing" textLength="293.5533" x="725" y="527.4649">The&#160;share&#160;root&#160;lives&#160;outside&#160;git&#160;and&#160;is&#160;populated</text><text fill="#000000" font-family="Monospace" font-size="13" lengthAdjust="spacing" textLength="322.8423" x="725" y="545.1709">by&#160;bind&#160;mounts&#160;instead&#160;of&#160;storing&#160;the&#160;canonical&#160;files.</text></g><g class="entity" data-qualified-name="GMN39" data-source-line="61" id="ent0040"><path d="M681,602.5679 L681,621.0679 L663.1006,625.0679 L681,629.0679 L681,647.9799 A0,0 0 0 0 681,647.9799 L997.2563,647.9799 A0,0 0 0 0 997.2563,647.9799 L997.2563,612.5679 L987.2563,602.5679 L681,602.5679 A0,0 0 0 0 681,602.5679" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M987.2563,602.5679 L987.2563,612.5679 L997.2563,612.5679 L987.2563,602.5679" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000