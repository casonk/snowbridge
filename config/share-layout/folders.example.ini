; snowbridge bind-mounted share layout
; Define which host folders should appear inside the SMB share root.
;
; Section names beginning with "folder " create bind mounts underneath
; share_root. The section suffix becomes the default target path unless the
; target field overrides it.

[global]
share_root = /srv/snowbridge/share
smb_user = snowbridge
smb_group = snowbridge
share_root_mode = 2770
mount_dir_mode = 2770
acl_user = snowbridge
acl_mode = rwx
default_acl_mode = rwx
grant_parent_traverse = yes
create_missing_sources = no
recursive_acl = yes

[folder Documents]
source = /home/example/Documents
persist = yes

[folder Photos]
source = /mnt/storage/photos
target = Media/Photos
persist = yes

[folder Archive]
source = /mnt/storage/archive
target = Archive
acl_mode = r-x
default_acl_mode = r-x
persist = yes
