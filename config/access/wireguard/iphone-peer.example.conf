# snowbridge WireGuard iPhone peer example
#
# Import the finished file into the WireGuard iPhone app by QR code or file
# after replacing every placeholder.

[Interface]
Address = 10.99.0.2/32
PrivateKey = <iphone-private-key>
DNS = 10.99.0.1

[Peer]
PublicKey = <server-public-key>
Endpoint = vpn.example.com:51820
AllowedIPs = 10.99.0.1/32, 192.168.1.50/32
PersistentKeepalive = 25

# Host-only SMB access:
# Use the host's WireGuard tunnel IP after connecting, for example:
# smb://10.99.0.1

# Optional wider-LAN access:
# Replace AllowedIPs with the tunnel subnet and the LAN subnet, for example:
# AllowedIPs = 10.99.0.0/24, 192.168.1.0/24
