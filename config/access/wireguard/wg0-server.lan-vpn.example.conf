# snowbridge WireGuard lan-vpn server example
#
# Profile: wireguard-lan-vpn
# Replace every placeholder before use. Keep the real private key outside git.
# This profile exposes only the WireGuard UDP listener publicly, but the VPN
# client is expected to route the wider home LAN through this host.

[Interface]
Address = 10.99.0.1/24
ListenPort = 51820
PrivateKey = <server-private-key>

# Recommended firewall posture:
# - allow UDP 51820 inbound to this host
# - allow LAN forwarding from the WireGuard interface only as intended
# - allow SMB and optional private HTTPS only from the WireGuard interface, LAN,
#   or both as intended

[Peer]
# iPhone peer
PublicKey = <iphone-public-key>
AllowedIPs = 10.99.0.2/32
PersistentKeepalive = 25

# The client-side AllowedIPs should include the full WireGuard tunnel subnet and
# the home LAN subnet. Use --lan-subnet with setup_wireguard.sh or replace the
# placeholder in iphone-peer.lan-vpn.example.conf manually.
