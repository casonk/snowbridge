# snowbridge WireGuard lan-vpn iPhone peer example
#
# Profile: wireguard-lan-vpn
# Import the finished file into the WireGuard iPhone app by QR code or file
# after replacing every placeholder.

[Interface]
Address = 10.99.0.2/32
PrivateKey = <iphone-private-key>
# setup_wireguard.sh configures dnsmasq on the server to answer this address
# for private HTTPS names such as files.snowbridge.internal by default.
DNS = 10.99.0.1

[Peer]
PublicKey = <server-public-key>
Endpoint = <wireguard-endpoint-hostname-or-ip>:51820
AllowedIPs = 10.99.0.0/24, <lan-subnet-cidr>
PersistentKeepalive = 25

# Replace <lan-subnet-cidr> with the real home LAN route, for example:
# 192.168.0.0/24
#
# This profile routes both the WireGuard tunnel subnet and the wider home LAN
# through the tunnel.
