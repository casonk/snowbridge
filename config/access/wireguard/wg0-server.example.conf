# snowbridge WireGuard server example
#
# Replace every placeholder before use. Keep the real private key outside git.
# This example is for host-only remote access first. Route the wider LAN only if
# you explicitly want the iPhone to reach the home subnet through the tunnel.

[Interface]
Address = 10.99.0.1/24
ListenPort = 51820
PrivateKey = <server-private-key>

# Optional host-only firewall posture:
# - allow UDP 51820 inbound to this host
# - allow SMB only from the WireGuard interface, LAN, or both as intended

[Peer]
# iPhone peer
PublicKey = <iphone-public-key>
AllowedIPs = 10.99.0.2/32
PersistentKeepalive = 25

# Optional wider-LAN routing note:
# If you want the iPhone to reach the whole home LAN through this host, add the
# LAN subnet to the iPhone peer's AllowedIPs on the client side and enable IPv4
# forwarding plus the corresponding firewall rules on the server.
