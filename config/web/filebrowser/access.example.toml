# snowbridge File Browser access example
#
# Copy this file to access.local.toml before use. Do not commit real passwords.
# If you paste a shell-style password that is not valid TOML yet, the setup
# script will normalize fixable password lines automatically. Ambiguous cases,
# such as unmatched quotes plus inline comments, still fail with a targeted
# error.
#
# Optional: override the auto-pass profile used for password_keepass_entry
# lookups. Leave unset to use config/auto-pass.ini, then the infra default.
# keepass_profile = "infra"

[runtime]
# Relative paths are resolved from this file's directory.
web_env_file = "filebrowser.env.local"
web_setup_script = "../../../scripts/setup_caddy_filebrowser.sh"
# Supported modes: "private-vpn", "private-vpn-mtls", "public", "public-private-ip"
mode = "private-vpn"
container_runtime = "auto"
filebrowser_image = "docker.io/filebrowser/filebrowser:latest"
container_name = "snowbridge-filebrowser"
share_mount_path = "/srv"
database_path = "/database/filebrowser.db"
run_as_account = "snowbridge"
run_as_group = "snowbridge"
sync_web_env_uid_gid = true
restart_strategy = "recreate"

[app]
root = "/srv"

# Optional [auth] override:
#
# When this section is omitted, private-vpn-mtls defaults to File Browser proxy
# auth and maps trusted client certificates to the "snowbridge" app user
# through Caddy's injected X-Snowbridge-Auth-User header.
#
# Supported methods depend on File Browser, but the common values are "json",
# "proxy", and "noauth".
#
# [auth]
# method = "proxy"
# proxy_header = "X-Snowbridge-Auth-User"
# proxy_username = "snowbridge"
# hide_login_button = true

[[users]]
username = "admin"
# Provide password as a plaintext value OR via a KeePassXC entry (preferred).
# Leave password_keepass_entry unset to use config/auto-pass.ini.
# password = 'CHOOSE_ADMIN_PASSWORD'
password_keepass_entry = "filebrowser/example-admin"
scope = "."
admin = true

[[users]]
username = "snowbridge"
# Leave password_keepass_entry unset to use config/auto-pass.ini.
# password = 'CHOOSE_FILEBROWSER_PASSWORD'
password_keepass_entry = "filebrowser/example-user"
scope = "."
admin = false
