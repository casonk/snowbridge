services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: snowbridge-filebrowser
    restart: unless-stopped
    user: "${SNOWBRIDGE_UID}:${SNOWBRIDGE_GID}"
    ports:
      - "127.0.0.1:${FILEBROWSER_HTTP_PORT}:80"
    volumes:
      - "${SNOWBRIDGE_SHARE_ROOT}:/srv"
      - "${FILEBROWSER_DB_DIR}:/database"
      - "${FILEBROWSER_CONFIG_DIR}:/config"

  caddy:
    image: caddy:2
    container_name: snowbridge-caddy
    restart: unless-stopped
    depends_on:
      - filebrowser
    ports:
      - "${CADDY_HTTP_BIND}:80"
      - "${CADDY_HTTPS_BIND}:443"
    volumes:
      - "${CADDYFILE_PATH}:/etc/caddy/Caddyfile:ro"
      - "${CADDY_DATA_DIR}:/data"
      - "${CADDY_CONFIG_DIR}:/config"
